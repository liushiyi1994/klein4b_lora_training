job: extension
config:
  name: marble_bust_v6_199_rank96_unquantized_style
  process:
    - type: diffusion_trainer
      training_folder: "{{ training_folder }}"
      device: "cuda"
      trigger_word: "<mrblbust>"
      network:
        type: "lora"
        linear: 96
        linear_alpha: 96
        conv: 48
        conv_alpha: 48
      save:
        dtype: "bf16"
        save_every: 400
        max_step_saves_to_keep: 50
      datasets:
        - folder_path: "data/marble-bust-data/v6_199/dataset"
          control_path_1: "data/marble-bust-data/v6_199/control"
          caption_ext: "txt"
          cache_latents_to_disk: true
          resolution:
            - 768
      train:
        batch_size: 1
        steps: 16000
        gradient_accumulation_steps: 1
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        lr: 0.00005
        noise_scheduler: "flowmatch"
        optimizer: "adamw8bit"
        skip_first_sample: false
        timestep_type: "weighted"
        content_or_style: "balanced"
        dtype: "bf16"
        unload_text_encoder: false
      model:
        arch: "flux2_klein_4b"
        name_or_path: "black-forest-labs/FLUX.2-klein-base-4B"
        quantize: false
        quantize_te: false
        low_vram: true
        model_kwargs:
          match_target_res: false
      sample:
